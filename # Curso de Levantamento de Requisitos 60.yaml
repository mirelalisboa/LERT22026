- workshop
  - levar o produto e serviço para o proximo stakeholder (pessoas interressadas)
  - obsrvar as informações e feedsback desse stakeholder a fim de melhorar para os proximos lançamentos 
  - atigem um publico especifico (pessoas mais conectadas aos produtos)


