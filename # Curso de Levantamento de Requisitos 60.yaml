# Curso de Levantamento de Requisitos 60h (80Aulas)

## Módulo 1 - Introdução a Levantamento de Requisitos e Metodologias Ágeis

## Módulo 2 - Levantamento de Requisitos (Continuação)

- O que é Levantamento de Requisitos
    - Transformar as necessidades do negócio em informações técnicas

- Requisitos Funcionais e Não Funcionais
    - RF - O que o sistema vai fazer
    - RNF - Como o sistema vai fazer

- Requistos, Regras, Restrições
    - Requistos: A Parte Técnica do sistema
    - Regras: As Necessidade dos Clientes
    - Restrições: Limitações impostas pela, linguagem, leis, normas, 

- Modelo de Documentação de Requisitos

|Campo|Conteúdo|Exemplo|
|----|------|------|
| ID | Código | RF-001 |
| Título | Valor | Tela de Login |
| Descrição | O Ator deve ser Capaz de | O Cliente conseguira fazer Login | 
| Prioridade | Valor da PRioridade | Alta |
| Regras Vinculadas | Outras Regras Relacionada | RN-001 - Banco de Dados |

### TECNICA DE LEVANTAMENTO DE REQUISITOS

- BRIENFING: coleta de dados iniciais. 
   - nome do projeto
   - objetivos do projeto
   - publico-alvo
   - orçamento 
   - prazos 
   - elementos de design (cores, fontes, estilos, logomarca, logotipo, slogan)
                         - manual de indentidade visual. 
   - indentidade do cliente 
     - missão, visão, valores. 

     - BRAINSTORM OU BRAINSTORMING: tecnica de sugetão de ideias para sugestaõ de problemas 
       - estruturadas: reunioes pautadas, com ordem de fala e tempo pre-determinado
        - nao estruturadas: apenas os problemas são apresentados
        - mistas: misturam com tecnicas de reunioes estruturadas com não estruturadas. podem ter tempo de fala, mas sem ordem de fala. 
      - Ferramentas para Brainstorm:
         - miro, mentimeter, one note, google docs, etc 
         
         - questionario: pro cliente 
          - perguntas direcionadas com o objetivo de montar o escopo do projeto
          - nessa etapa o projeto passa a ganahr corpo e documentação 
          - Exemplos de perguntas: 
           - aonde sera acessado?
           - quem ira acessar? 
           - o que acontece quando clica aqui? 

      - Ferramentas para o questionario:
        - git e gitub (versionamento)

 ## entrevista: 
   - ato de conversar com o usuario do sistema
   - indentificação das dores e conhecimentos do usuario
   - fonte de informação para a melhoria do sistema 
   - nessa etapa ja existe um MVP(minimo prduto viavel);

